<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Tech Website</title>
    <style>
       
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #895129 50%, #FFDE21 100%);
            background-attachment: fixed;
            padding: 20px;
        }

        
        .glass-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 28px;
            padding: 60px 50px;
            width: 100%;
            max-width: 700px; 
            text-align: center;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        
        .logo-circle {
            width: 140px;
            height: 140px;
            background: white;
            border-radius: 25px;
            margin: 0 auto 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.35);
            transform: rotate(-10deg);
        }

        .logo-circle img {
            border-radius: 10px;
            width: 130px;
        }

        
        h1 {
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
            font-size: 1.2rem;
        }

        
        .nav-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.9);
            color: #1e3a8a;
            padding: 22px 26px;
            border-radius: 18px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .nav-item:hover {
            background: #ffffff;
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .nav-item.primary {
            background: #facc15;
            color: #422006;
            padding: 24px 28px;
            font-size: 1.25rem;
        }

        .nav-item.primary:hover {
            background: #fef08a;
        }

        
        .footer {
            margin-top: 35px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="logo-circle">
            <img src="Images/D3.jpeg" alt="Logo">
        </div>

        <h1>Future Tech <br></h1>
        <p>Click on one of the buttons to learn CSS lessons</p>

        <div class="nav-list">
            <a class="nav-item" href="FutureHtml/NewPage1.html">
                <span>Grade 11</span>
                <span>→</span>
            </a>
            
            <a class="nav-item" href="FutureHtml/NewPage2.html">
                <span>Grade 12</span>
                <span>→</span>
            </a>
        </div>

        <div class="footer">
            © Future Tech 2025 / Designed by Grade 12 TVL-ICT Group 2
        </div>
    </div>

</body>
</html>
