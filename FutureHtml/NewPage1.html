<!DOCTYPE html>
<html>
<head>
<title>Future Tech</title>

<style>
*,
*::before,
*::after {
    box-sizing: border-box;
}
    
html, body {
    height: 100%;
    margin: 0;
}

body {
    background-color: #BFDEF5;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
}

.card-container {
    display: grid;
    grid-template-columns: repeat(2, 400px);
    gap: 80px;
    justify-content: center;
    padding: 40px 20px;
}

.card {
    width: 400px;
    height: 300px;
    border: outset;
    display: flex;
    flex-direction: column;
    justify-content: flex-end; /* buttons at bottom */
    overflow: hidden; /* clip overflowing image */
    position: relative;
    color: white; /* text on top of image */
}

.card img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover; /* ⭐ makes image fully cover card */
    z-index: 0;
}

.card h2, .btn-group {
    position: relative;
    z-index: 1; /* put text/buttons on top of image */
    text-align: center;
}

.card h2 {
    margin: 0 0 10px 0;
    font-weight: bold;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
}

.btn-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 10px;
}

.b1 {
    height: 30px;
    width: 110px;
    color: blue;
    background-color: yellow;
    border: solid 3px blue;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

.b1:hover {
    background-color: #fff176;
}

.upper {
    color: #CFD9F5;
    display: flex;
    width: 100%;
    background-color: #598AAD;
    align-items: center;
    justify-content: center;
    font-size: 60px;
    border: inset;
    font-weight: bold;
    padding: 20px;
}

.lower {
    display: flex;
    width: 100%;
    background-color: white;
    margin-top: auto;
    gap: 10px;
    font-size: 20px;
    padding: 15px;
    justify-content: center;
    flex-wrap: wrap;
}

.footer-bottom {
    text-align: center;
    background-color: white;
    padding: 8px;
    font-size: 14px;
    flex-wrap: wrap;
    width: 100%;
    box-sizing: border-box;
}

a {
    text-decoration: none;
}
</style>
</head>
