<!DOCTYPE html>

<style>
*,
*::before,
*::after {
    box-sizing: border-box;
}
    

html, body {
    height: 100%;
    margin: 0;
}

body {
    background-color: #BFDEF5;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
}






.card-container {
    display: grid;
    grid-template-columns: repeat(2, 400px);
    gap: 80px;
    justify-content: center;
    padding: 40px 20px;
}


.card {
    width: 400px;
    height: 300px;
    background-color: white;
    border: outset;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 20px;
}

.card h2 {
    margin: 0 0 20px 0;
    color: #333;
}



.btn-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-top: auto;
    padding-bottom: 20px;
}

.b1 {
    height: 30px;
    width: 110px;
    color: blue;
    background-color: yellow;
    border: solid 3px blue;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

.b1:hover {
    background-color: #fff176;
}


.upper {
    color: #CFD9F5;
    display: flex;
    width: 100%;
    background-color: #598AAD;
    align-items: center;
    justify-content: center;
    font-size: 60px;
    border: inset;
    font-weight: bold;
    padding: 20px;
}

.lower {
    display: flex;
    width: 100%;
    background-color: white;
    margin-top: auto;
    gap: 10px;
    font-size: 20px;
    padding: 15px;
    justify-content: center;
    flex-wrap: wrap;
   
   
}

.footer-bottom {
    text-align: center;
    background-color: white;
    padding: 8px;
    font-size: 14px;
    flex-wrap: wrap;
    width: 100%;
    box-sizing: border-box;
}

a {
    text-decoration: none;
}

</style>
</head>
