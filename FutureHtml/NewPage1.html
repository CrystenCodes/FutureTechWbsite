<!DOCTYPE html>
<html>
<head>
<title>Future Tech</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*,
*::before,
*::after {
    box-sizing: border-box;
}

html, body {
    height: 100%;
    margin: 0;
}

body {
    background-color: #BFDEF5;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
}

/* ================= HEADER ================= */
.upper {
    color: #CFD9F5;
    display: flex;
    width: 100%;
    background-color: #598AAD;
    align-items: center;
    justify-content: center;
    font-size: 60px;
    border: inset;
    font-weight: bold;
    padding: 20px;
    text-align: center;
}

/* ================= INSTRUCTION BAR ================= */
.instruction-bar {
    background-color: #ffeb3b;
    color: #000;
    padding: 15px;
    text-align: center;
    font-weight: bold;
    font-size: 18px;
    border-bottom: 2px solid #fdd835;
}

/* ================= CARD CONTAINER ================= */
.card-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    padding: 20px;
    width: 100%;
}

/* ================= CARD ================= */
.card {
    width: 100%;
    height: 300px;
    border: outset;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    overflow: hidden;
    position: relative;
    color: white;
}

.card img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
}

.card h2,
.btn-group {
    position: relative;
    z-index: 1;
    text-align: center;
}

.card h2 {
    margin: 0 0 10px 0;
    font-weight: bold;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
}

/* ================= BUTTONS ================= */
.btn-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 12px;
}

.b1 {
    height: 32px;
    width: 110px;
    color: blue;
    background-color: yellow;
    border: solid 3px blue;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.b1:hover {
    background-color: #fff176;
    transform: scale(1.05);
}

/* ================= FOOTER ================= */
.lower {
    display: flex;
    width: 100%;
    background-color: white;
    margin-top: auto;
    gap: 10px;
    font-size: 20px;
    padding: 15px;
    justify-content: center;
    flex-wrap: wrap;
    text-align: center;
}

.footer-bottom {
    text-align: center;
    background-color: white;
    padding: 8px;
    font-size: 14px;
    width: 100%;
}

a {
    text-decoration: none;
}

/* ================= MOBILE RESPONSIVE ================= */
@media (max-width: 768px) {

    .upper {
        font-size: 32px;
        padding: 15px;
    }

    .card {
        height: 220px;
    }

    .card h2 {
        font-size: 18px;
    }

    .b1 {
        width: 90px;
        height: 28px;
        font-size: 12px;
    }

    .lower {
        font-size: 16px;
    }

    .footer-bottom {
        font-size: 12px;
    }
}
</style>
</head>
