<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pages Quiz</title>
<style>
/* ===== Body ===== */
body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(to bottom, blanchedalmond, #fff);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* ===== Header ===== */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: rgb(190, 203, 245);
    padding: 20px 40px;
    color: white;
    font-family: 'Comic Sans MS', cursive;
    border-radius: 10px;
    margin: 10px;
}

header h1 {
    margin: 0;
    font-size: 36px;
}

.home-btn {
    background-color: white;
    color: rgb(80, 100, 200);
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    text-decoration: none;
}

.home-btn:hover {
    background-color: #f2f2f2;
}

/* ===== Main Layout ===== */
.main-layout {
    flex: 1;
    display: flex;
    gap: 20px;
    width: 100%;
    padding: 20px;
    box-sizing: border-box;
    align-items: stretch; /* fill vertically */
}

/* ===== Left Column (Questions) ===== */
.quiz-left {
    flex: 2;
    display: flex;
}

.quiz-box {
    background-color: white;
    padding: 30px;
    border-radius: 15px;
    border: 1px solid #d2b48c;
    box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 100%;
    font-size: 20px; /* bigger font for filling space */
}

.question-block {
    margin-bottom: 25px;
}

.quiz-box .question {
    font-weight: bold;
    font-size: 22px;
    margin-bottom: 10px;
}

.quiz-box label {
    font-size: 18px;
    margin-bottom: 8px;
    display: block;
}

.quiz-box input[type="radio"] {
    margin-right: 10px;
}

/* ===== Right Column (Image + Button) ===== */
.quiz-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.reference {
    width: 100%;
    height: auto;
    max-height: 500px; /* make it bigger */
    border: 1px solid #000;
    border-radius: 10px;
    object-fit: cover;
}

.check-container {
    margin-top: 20px;
}

/* ===== Check Button ===== */
button {
    padding: 15px 25px;
    background-color: #deb887;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
    width: 100%;
}

button:hover {
    background-color: #cd853f;
}

/* ===== Result ===== */
#result {
    margin-top: 10px;
    font-weight: bold;
    color: #2e8b57;
}

/* ===== Footer ===== */
footer {
    text-align: center;
    padding: 15px;
    background-color: #f4f4f4;
    color: rgb(113, 173, 230);
    margin-top: auto;
    font-size: 14px;
}

/* ===== Responsive ===== */
@media (max-width: 900px) {
    .main-layout {
        flex-direction: column;
    }
    .quiz-right {
        flex-direction: column;
    }
    .reference {
        max-height: none;
        width: 100%;
    }
}
</style>
</head>
<body>

<header>
    <h1>Quizzes</h1>
    <a href="index.html" class="home-btn">Homepage</a>
</header>

<div class="main-layout">

    <!-- Left Column: Questions -->
    <div class="quiz-left">
        <div class="quiz-box">
            <div class="question-block">
                <p class="question">1. What is Web 2.0?</p>
                <label><input type="radio" name="q1" value="a"> A Read-only web with static content</label>
                <label><input type="radio" name="q1" value="b"> A Read-write web where users can interact and create content</label>
                <label><input type="radio" name="q1" value="c"> A purely theoretical web that doesn't exist yet</label>
            </div>

            <div class="question-block">
                <p class="question">2. Which type of AI is currently still a "theoretical concept"?</p>
                <label><input type="radio" name="q2" value="a"> Narrow AI (Siri/Alexa)</label>
                <label><input type="radio" name="q2" value="b"> General AI</label>
                <label><input type="radio" name="q2" value="c"> Chatbots like ChatGPT</label>
            </div>

            <div class="question-block">
                <p class="question">3. What is the main goal of Assistive Media?</p>
                <label><input type="radio" name="q3" value="a"> To make websites look more colorful</label>
                <label><input type="radio" name="q3" value="b"> To help people with disabilities access information</label>
                <label><input type="radio" name="q3" value="c"> To speed up internet connections</label>
            </div>
        </div>
    </div>

    <!-- Right Column: Image Top + Button Bottom -->
    <div class="quiz-right">
        <img src="../Images/Screenshot 2026-02-15 144855.png" alt="Yahoo Web 1.0" class="reference">
        <div class="check-container">
            <button onclick="checkAnswers()">Check Answers</button>
            <p id="result"></p>
        </div>
    </div>

</div>

<footer>
    © Future Tech 2025 / Designed by Grade 12 TVL-ICT Group 2
</footer>

<script>
function checkAnswers() {
    let score = 0;
    const total = 3;

    const q1 = document.querySelector('input[name="q1"]:checked');
    if(q1 && q1.value === "b") score++;

    const q2 = document.querySelector('input[name="q2"]:checked');
    if(q2 && q2.value === "b") score++;

    const q3 = document.querySelector('input[name="q3"]:checked');
    if(q3 && q3.value === "b") score++;

    document.getElementById("result").innerHTML = `You scored ${score} out of ${total}!`;
}
</script>

</body>
</html>
